<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SHIO MONK MODE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="d-flex align-items-center justify-content-center auth-body">
    
    <div class="card p-4 shadow-lg text-center glass-card" style="width: 350px;">
        <h2 class="mb-4 text-info">INICIAR SESIÓN</h2>
        
        <form method="POST">
            <input type="text" name="username" class="form-control mb-3" placeholder="Usuario" required>
            <input type="password" name="password" class="form-control mb-3" placeholder="Contraseña" required>
            <button type="submit" class="btn btn-info w-100 mb-3 fw-bold">ENTRAR 🧘🏽‍♂️</button>
        </form>
        
        <p class="small text-secondary">¿Nuevo aquí? <a href="/register" class="text-success text-decoration-none fw-bold">Regístrate</a></p>
    </div>

</body>
</html>
